<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .brand {
        font-size: 72px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 24px;
      }
      .brand .prompt {
        color: #00ff88;
        font-family: monospace;
      }
      .tagline {
        font-size: 28px;
        color: #888899;
        margin-bottom: 32px;
      }
      .services {
        font-size: 20px;
        color: #555566;
        font-family: monospace;
        margin-bottom: 80px;
      }
      .install {
        font-size: 18px;
        color: #00ff88;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="brand"><span class="prompt">$</span> aimock</div>
    <div class="tagline">Mock everything your AI app talks to</div>
    <div class="services">
      LLM APIs &nbsp;|&nbsp; MCP &nbsp;|&nbsp; A2A &nbsp;|&nbsp; Vector DBs &nbsp;|&nbsp; Search
    </div>
    <div class="install">npm install @copilotkit/aimock</div>
  </body>
</html>
